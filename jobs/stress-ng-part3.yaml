suite: stress-ng
testcase: stress-ng
category: benchmark

nr_threads: 100%

testtime:
  - 60s

stress-ng:
  test:
    - nanosleep
    - netdev
    - netlink-proc
    - netlink-task
    - ng
    - nice
    - nop
    - "null"
    # - null
    - numa
    - numacopy
    - pagemove
    - pageswap
    - pci
    - personality
    - peterson
    - physmmap
    - physpage
    - pidfd
    - ping-sock
    - pipeherd
    - pkey
    - plugin
    - poll
    - powmath
    - prctl
    - prio-inv
    - priv-instr
    - pseek
    - ptr-chase
    - ptrace
    - pty
    - quota
    - race-sched
    - ramfs
    - randlist
    - rawpkt
    - rawsock
    - rawudp
    - rdrand
    - readahead
    - reboot
    - regex
    - regs
    - remap
    - resched
    - revio
    - ring-pipe
    - rlimit
    - rmap
    - rofs
    - rotate
    - rseq
    - rtc

---
nr_threads: 50%
need_memory: 216G

stress-ng:
  test:
    - oom-pipe

---
stress-ng:
  test:
    - qsort
  method:
    - qsort-bm
    - qsort-libc

---
stress-ng:
  test:
    - prefetch
  method:
    - builtin
    - builtinl0
    - builtinl3
    - prefetchnta
    - prefetcht0
    - prefetcht1
    - prefetcht2

---
stress-ng:
  test:
    - prime
  method:
    - factorial
    - inc
    - pwr10
    - pwr2

---
stress-ng:
  test:
    - radixsort
  method:
    - radixsort-nonlibc

---
stress-ng:
  test:
    - opcode
  method:
    - inc
    - mixed
    - random
    - text

---
stress-ng:
  test:
    - pipe
    - pthread
  sched:
    - batch
    - deadline
    - fifo
    - idle
    - other
    - rr
---
need_memory: 224G
stress-ng:
  test:
    - resources
