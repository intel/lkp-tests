suite: lmbench3
testcase: lmbench3
category: benchmark

test_memory_size: 50%

# Test mdoe all,hardware,os were commented temporally,since it will take very long time
# more than 2 hours on test machine lkp-bdw-ep4.
# lmbench3:
#   - mode: all
#   - mode: hardware
#   - mode: os

# ---
nr_threads:
  # - 1
  - 20%
  # - 100%
lmbench3:
  mode: development
  test:
    # From Lmbench3 source scripts, run lat_connect when "$SYNC_MAX = 1", so case CONNECT only test with 1 thread.
    - CONNECT
    - CTX
    - MMAP
    - OPS
    - PAGEFAULT
    - PIPE
    - PROC
    - SELECT
    - SYSCALL
    - TCP
    # Case UDP can get test result when nr_threads=1, if nr_threads set as 50%,100%, can't get correct result, showing "Recv timed out".
    - UDP
    - UNIX
    # # MEM is about cache and memory latency related case, it will take more than 2 hours on test machine lkp-bdw-ep4.
    # - MEM

---
# nr_threads at 10% (~22 threads on a 224-CPU host) causes severe
# multi-thread memory-bandwidth contention across BCOPY's power-of-two
# buffer-size sweep, exceeding the 2h soft-timeout budget even with
# test_memory_size capped down (see programs/lmbench3/run). Use a small
# fixed thread count instead.
nr_threads:
  - 4

lmbench3:
  mode: development
  test:
    - BCOPY
    - FILE
