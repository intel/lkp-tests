# Homepage: https://github.com/sslab-gatech/fxmark

suite: fxmark
testcase: fxmark
category: benchmark

disk: 1HDD
media: hdd

fxmark:
  test:
    - dbench_client
    - DRBH
    - DRBL
    - DRBM
    - DWAL
    - DWOL
    - DWOM
    - DWSL
    - DWTL
    # - filebench_fileserver
    # - filebench_oltp
    # - filebench_varmail
    - MRDL
    - MRDM
    - MRPH
    - MRPL
    - MRPM
    - MWCL
    - MWCM
    - MWRL
    - MWRM
    - MWUL
    - MWUM
  fstype:
    - btrfs
    - ext4
    - ext4_no_jnl
    - xfs
  directio:
    - bufferedio
    - directio
  thread_nr:
    # - 1
    # - 2
    - 4
    - 18
    # - 36 # may have disk space contention issue
    - 54
    # - 72
