suite: ltp
testcase: ltp
category: functional

need_memory: 4G

ltp:
  test:
    - can
    - capability
    - commands
    - containers
    - cpuhotplug
    # - dma_thread_diotest # kernel bug, will nerver be success. please see https://github.com/linux-test-project/ltp/issues/63
    - fcntl-locktests
    - hugetlb
    - hyperthreading
    - input
    - irq
    - kvm

---
# ima_measurements test3 ("verify not measuring user files") only runs its
# real check when booted with the builtin "tcb" IMA policy on the kernel
# command line - the runtime LTP_IMA_LOAD_POLICY=1 fallback (see the `ima)`
# case in lib/tests/ltp.sh) satisfies ima_violations/ima_keys but not this
# stricter policy-content check (verify_ima_policy()/test3() in upstream
# testcases/kernel/security/integrity/ima/tests/ima_setup.sh,
# ima_measurements.sh).
kernel_cmdline: ima_policy=tcb

ltp:
  test:
    - ima
